syntax = "proto3";

package chat;

option go_package = "go-learning/18_grpc_streaming/proto";

message ChatMessage {
  string user = 1;
  string content = 2;
  int64 timestamp = 3;
}

message SubscribeRequest {
  string topic = 1;
}

message MessageSummary {
  int32 message_count = 1;
  string last_user = 2;
}

service ChatService {
  // Server Streaming: 服务端推送
  rpc Subscribe(SubscribeRequest) returns (stream ChatMessage);

  // Client Streaming: 客户端批量发送
  rpc SendMessages(stream ChatMessage) returns (MessageSummary);

  // Bidirectional Streaming: 双向流（聊天）
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}
